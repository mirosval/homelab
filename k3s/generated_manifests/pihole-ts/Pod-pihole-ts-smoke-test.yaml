apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
  name: pihole-ts-smoke-test
  namespace: pihole-ts
spec:
  containers:
    - command:
        - sh
        - -c
        - curl http://pihole-ts-web:80/
      image: curlimages/curl
      imagePullPolicy: IfNotPresent
      name: hook1-container
  restartPolicy: Never
  terminationGracePeriodSeconds: 0
