apiVersion: v1
kind: Service
metadata:
  labels:
    app: pihole
    app.kubernetes.io/name: pihole
    chart: pihole-2.35.0
    heritage: Helm
    release: pihole-ts
  name: pihole-ts-dns-udp
  namespace: pihole-ts
spec:
  externalTrafficPolicy: Local
  loadBalancerClass: tailscale
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
  selector:
    app: pihole
    release: pihole-ts
  type: LoadBalancer
