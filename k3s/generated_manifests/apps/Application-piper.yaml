apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piper
  namespace: argocd
spec:
  destination:
    namespace: piper
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./k3s/generated_manifests/piper
    repoURL: https://github.com/mirosval/homelab.git
    targetRevision: main
  syncPolicy: {}
