apiVersion: v1
kind: Service
metadata:
  annotations:
    tailscale.com/hostname: homelab
  name: traefik-tailscale-lb
  namespace: traefik
spec:
  loadBalancerClass: tailscale
  ports:
    - name: websecure
      port: 443
      protocol: TCP
      targetPort: websecure
  selector:
    app.kubernetes.io/instance: traefik-traefik
    app.kubernetes.io/name: traefik
  type: LoadBalancer
