apiVersion: v1
kind: Service
metadata:
  labels:
    app: pihole
    app.kubernetes.io/name: pihole
    chart: pihole-2.35.0
    heritage: Helm
    release: pihole-tailscale
  name: pihole-tailscale-dhcp
  namespace: pihole-tailscale
spec:
  externalTrafficPolicy: Local
  ports:
    - name: client-udp
      port: 67
      protocol: UDP
      targetPort: client-udp
  selector:
    app: pihole
    release: pihole-tailscale
  type: NodePort
