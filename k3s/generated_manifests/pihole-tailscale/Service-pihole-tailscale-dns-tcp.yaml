apiVersion: v1
kind: Service
metadata:
  labels:
    app: pihole
    app.kubernetes.io/name: pihole
    chart: pihole-2.35.0
    heritage: Helm
    release: pihole-tailscale
  name: pihole-tailscale-dns-tcp
  namespace: pihole-tailscale
spec:
  externalTrafficPolicy: Local
  loadBalancerClass: tailscale
  ports:
    - name: dns
      port: 53
      protocol: TCP
      targetPort: dns
  selector:
    app: pihole
    release: pihole-tailscale
  type: LoadBalancer
